<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed – QuickConnect</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container">
  <br>
  <div class="card" style="border: 2px solid var(--accent2);">

    <div class="success-icon">
      <i class="fa fa-handshake"></i>
    </div>
    <h2 style="color: var(--accent2);">Connection Established!</h2>
    <p>You have successfully booked a service provider.</p>

    <hr class="divider">

    <div style="text-align:left;">
      <p><strong>Provider Name</strong><br>{{ worker.name }}</p>
      <p><strong>Service</strong><br>{{ worker.job }}</p>
      <p><strong>Contact Number</strong><br>{{ worker.phone }}</p>
    </div>

    <div class="otp-box">
      <div class="otp-label">Your Service Start OTP</div>
      <div class="otp-code">{{ otp }}</div>
      <div class="otp-hint">Share this code with the worker when they arrive at your location.</div>
    </div>

  </div>

  <a href="{{ url_for('client_dashboard') }}" class="btn btn-primary btn-block">
    <i class="fa fa-house"></i> Go to Dashboard
  </a>

</div>
</body>
</html>
