<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickConnect – Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container">

  <div class="wordmark">Quick<span>Connect</span></div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <div class="card">
    <h2><i class="fa fa-user-lock"></i> Login</h2>
    <br>
    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" name="phone" placeholder="e.g. 9800000001" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn-primary btn-block">
        <i class="fa fa-right-to-bracket"></i> Login
      </button>
    </form>
  </div>

  <p style="text-align:center; margin-top: 12px;">
    Don't have an account? Sign up as:&nbsp;
    <a href="{{ url_for('register', role='client') }}"><i class="fa fa-user"></i> Client</a>
    &nbsp;·&nbsp;
    <a href="{{ url_for('register', role='worker') }}"><i class="fa fa-tools"></i> Worker</a>
  </p>

</div>
</body>
</html>
