<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickConnect – Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container">

  <div class="wordmark">Quick<span>Connect</span></div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <div class="card">
    <h2>
      <i class="fa fa-{% if role == 'worker' %}tools{% else %}user{% endif %}"></i>
      Register as {{ role|capitalize }}
    </h2>
    <br>
    <form method="POST" action="{{ url_for('register', role=role) }}">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" name="phone" placeholder="e.g. 9800000001" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Choose a password" required>
      </div>
      {% if role == 'worker' %}
      <div class="form-group">
        <label>Your Trade / Job</label>
        <input type="text" name="job" placeholder="e.g. Plumber, Electrician, Painter" required>
      </div>
      {% endif %}
      <button type="submit" class="btn-primary btn-block">
        <i class="fa fa-user-plus"></i> Create Account
      </button>
    </form>
  </div>

  <p style="text-align:center; margin-top: 12px;">
    Already have an account? <a href="{{ url_for('login') }}">Login</a>
  </p>

</div>
</body>
</html>
